<style>
:root {
--main-layout: auto auto auto auto;
--main-width: 24.9vw;
--main-height: 31vh;
--accent: #0077ff;
--bg-dark: #0a0a0a;
--menu-blur: blur(10px);
}

body,
html {
background: var(--bg-dark);
font-size: 100%;
max-width: 100%;
overflow-x: hidden;
height: 100%;
margin: 0;
justify-content: center;
align-items: center;
}

/* Style for the div containing the iframe */
.iframe-container {
background-color: black;
border: 0px none;
position: fixed;
height: 100%;
width: 100%;
z-index: -2;
justify-content: center;
align-items: center;
}

.img-zoom {
background-color: black;
left: 0px;
border: 0px none;
height: 100%;
width: 100%;
position: fixed;
overflow: hidden;
bottom: 0px;
z-index: -2;
}

/* Style for the iframe element */
.full-screen {
background-color: black;
border: 0px none;
height: 100%;
width: 98%;
margin-bottom: 0px;
margin-left: 1%;
justify-content: center;
align-items: center;
-ms-zoom: 1;
-moz-transform: scale(1);
-moz-transform-origin: 0 0;
-o-transform: scale(1);
-o-transform-origin: 0 0;
-webkit-transform: scale(1);
-webkit-transform-origin: 0 0;
}

.default-frame {
margin-top: 0px;
margin-bottom: 0px;
margin-left: 0px;
left: 0px;
border: 0px none;
height: 100%;
width: 100%;
position: fixed;
overflow: hidden;
bottom: 0px;
}

.top-bar {
display: grid;
grid-template-columns: 1fr auto 1fr;
background-color: #1a1a1a;
color: #fff;
padding: 0.8rem 1rem;
border: 0px none;
overflow: hidden;
position: relative;
width: auto;
gap: 1rem;
}

.child {
position: relative;
display: flex;
align-items: center;
border: 1px solid hsl(210deg 8% 30%);
border-radius: 6px;
background: hsl(210deg 15% 15%);
color: white;
padding: 0.4rem 0.8rem;
font-family: "Victor Mono", monospace;
font-size: 0.95rem;
}

#topBarCenter {
font-family: "Audiowide", sans-serif;
color: var(--accent);
font-size: 1.1rem;
white-space: nowrap;
}

/* Style for the dashboard container */
.dashboard {
display: grid;
grid-template-columns: var(--main-layout);
grid-gap: 4px;
border: 0px none;
margin-bottom: 0px;
overflow: hidden;
position: relative;
width: 100%;
padding: 4px;
box-sizing: border-box;
}

/* Style for the image container */
.image-container {
position: relative;
float: inline-start;
margin-right: 0px;
border: 0px none;
height: var(--main-height);
width: var(--main-width);
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
border-radius: 8px;
background: #111;
border: 1px solid #222;
}

.iframe-tile {
position: absolute;
float: inline-start;
overflow: hidden;
border: 0px none;
display: flex;
height: var(--main-height);
width: var(--main-width);
margin: 0;
border-radius: 8px;
}

/* Style for the image */
.image-container img {
height: 100%;
width: 100%;
object-fit: cover;
}

/* Style for the image titles */
.image-title {
position: absolute;
bottom: 8px;
left: 50%;
transform: translateX(-50%);
color: white;
background-color: rgba(0,0,0,0.7);
font-size: 0.85rem;
border-radius: 4px;
padding: 2px 8px;
font-family: "Roboto Condensed", sans-serif;
font-weight: 400;
z-index: 2;
backdrop-filter: var(--menu-blur);
}

.click-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: transparent;
z-index: 1;
cursor: pointer;
}

/* Style for the full screen image */
.image-large {
display: block;
position: relative;
margin-left: auto;
margin-right: auto;
max-height: 100%;
max-width: 100%;
height: 100%;
width: auto;
}

.media {
height: 100%;
width: 100%;
cursor: pointer;
}

.hidden {
display: none;
}

/* Style for the left menu options */
.menuL {
display: grid;
grid-gap: 4px;
position: fixed;
height: auto;
width: auto;
margin-top: 80px;
left: -140px;
z-index: 10;
transition: 0.25s ease;
}

/* Style for the right menu options */
.menuR {
display: grid;
grid-gap: 4px;
position: fixed;
height: auto;
width: auto;
margin-top: 80px;
right: -140px;
z-index: 10;
transition: 0.25s ease;
}

#myMenuL:hover { left: 0px; }
#myMenuR:hover { right: 0px; }

#mySidenavL a {
position: relative;
float: inline-start;
left: 0;
transition: 0.25s;
padding: 12px 16px;
width: 140px;
text-decoration: none;
font-family: "Bebas Neue", sans-serif;
font-size: 1.1rem;
text-align: right;
color: white;
border-radius: 0 8px 8px 0;
box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.6);
backdrop-filter: var(--menu-blur);
}

#mySidenavL a:hover { left: 5px; }

#mySidenavR a {
position: relative;
float: inline-start;
right: 0;
transition: 0.25s;
padding: 12px 16px;
width: 140px;
text-decoration: none;
font-family: "Bebas Neue", sans-serif;
font-size: 1.1rem;
text-align: left;
color: white;
border-radius: 8px 0px 0px 8px;
box-shadow: -4px 4px 12px rgba(0, 0, 0, 0.6);
backdrop-filter: var(--menu-blur);
}

#mySidenavR a:hover { right: 5px; }

.menu-link.menu-core::before {
content: '★ ';
opacity: 0.8;
}

.menu-link.menu-config::before {
content: '⚙️ ';
opacity: 0.8;
display: inline-block;
transform: scale(0.8);
}

.overlay {
display: none;
position: fixed;
top: 0;
left: 0;
height: 100%;
width: 100%;
background-color: rgba(0, 0, 0, 0.9);
color: white;
padding: 50px;
box-sizing: border-box;
z-index: 20;
font-family: "Roboto Condensed", sans-serif;
}

.overlay-content {
background-color: #1a1a1a;
padding: 20px;
border-radius: 10px;
max-height: 80vh;
overflow-y: auto;
border: 1px solid #333;
}

.close-btn {
cursor: pointer;
color: white;
float: right;
font-size: 24px;
}

/************************/
/* Settings page styles */
/************************/
.settings-Page {
display: none;
font-family: Arial, sans-serif;
margin-top: 37px;
background-color: #f5f5f5;
height: 98%;
width: 98%;
margin-left: 1%;
overflow-y: auto;
color: #111;
}

.fixed-section {
display: none;
text-align: center;
position: fixed;
top: 0;
left: 1%;
width: 98%;
background-color: var(--accent);
padding-top: 7px;
box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
z-index: -3;
}

.section {
margin-bottom: 20px;
display: flex;
flex-wrap: wrap;
}

label {
margin: 2px;
font-weight: bold;
}

input[type="text"] {
width: 90%;
padding: 4px;
margin-right: 5px;
margin-bottom: 3px;
border: 1px solid #ccc;
border-radius: 4px;
}

input[type="number"] {
width: 20%;
padding: 4px;
margin-bottom: 10px;
border: 1px solid #ccc;
border-radius: 4px;
}

table {
width: 100%;
border-collapse: collapse;
margin-bottom: 10px;
}

table th,
table td {
border: 1px solid #ddd;
padding: 8px;
align-content: start;
}

table th {
background-color: #f4f4f4;
}

button {
padding: 6px 12px;
margin: 0 4px 7px 0;
cursor: pointer;
background: linear-gradient(#f7f8fa, #e7e9ec);
border: 1px solid #adb1b8;
border-radius: 4px;
color: #0f1111;
font-size: 13px;
}

button:hover {
border-color: #a2a6ac #979aa1 #82858a;
}

.radio-group {
display: flex;
align-items: center;
}

.radio-group label {
margin-right: 15px;
padding-top: 5px;
font-weight: normal;
}

/************************/
/* Settings RSS styles */
/************************/
.rss-ticker {
position: fixed;
bottom: 0;
width: 100%;
background-color: rgba(0, 0, 0, 0.8);
overflow: hidden;
white-space: nowrap;
box-sizing: border-box;
padding: 6px 0;
font-family: "Victor Mono", monospace;
font-size: 0.9rem;
font-weight: bold;
z-index: 10;
backdrop-filter: var(--menu-blur);
border-top: 1px solid #222;
}

.rss-ticker-content {
display: inline-block;
padding-left: 100%;
animation: ticker var(--ticker-duration, 90s) linear infinite;
animation-play-state: running;
}

.rss-ticker-content a {
text-decoration: none;
color: var(--accent);
}

@keyframes ticker {
0% { transform: translateX(0%); }
100% { transform: translateX(-100%); }
}
</style>

function getColumnHeaderTitle(tableId, columnNumber) {
const table = document.getElementById(tableId);
if (!table) {
console.error(`Table with id ${tableId} not found.`);
return null;
}

const headers = table.querySelectorAll("thead th");
if (columnNumber < 0 || columnNumber >= headers.length) {
console.error(`Invalid column number ${columnNumber}.`);
return null;
}

return headers[columnNumber].textContent;
}

adjustDashboardItems = () => {
const totalItems = settings.layout_cols * settings.layout_rows;

updateMenuTable = () => {

};

updateFeedTable = () => {

};
