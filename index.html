<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="F4IOW — Mission Dashboard — Colmar, France — JN38QB — DX Elite Station.">
<title>F4IOW · Mission Dashboard</title>
<link href="https://fonts.googleapis.com/css?family=Victor Mono|Bebas Neue" rel="stylesheet">
<style>
:root{--main-layout:auto auto auto auto;--main-width:24.9vw;--main-height:31vh;--line:hsl(210deg 8% 50%);--tile:hsl(210deg 15% 20%);--orange:#e77600;--green:#0dd1a7;--cyan:aquamarine;--blue:#0077ff}*{box-sizing:border-box}html,body{background:#000;color:#fff;height:100%;margin:0;overflow:hidden;font-family:"Victor Mono",monospace}.iframe-container{background:#000;position:fixed;height:100%;width:100%;z-index:-2}.full-screen{background:#000;border:0;height:100%;width:98%;margin-left:1%;transform-origin:0 0}.img-zoom{background:#000;left:0;height:100%;width:100%;position:fixed;overflow:hidden;bottom:0;z-index:-2}.image-large{display:block;margin:auto;max-height:100%;max-width:100%;height:100%;width:auto}.default-frame{height:100%;width:100%;position:fixed;overflow:hidden;bottom:0}.top-bar{display:grid;grid-template-columns:2fr 1fr 2fr;background:#333;color:#fff;padding:1vh}.child{display:grid;border:1px solid var(--line);border-radius:5px;background:var(--tile);padding:.5vh;font-size:1.2vw}.dashboard{display:grid;grid-template-columns:var(--main-layout);grid-gap:0;width:100%}.image-container{position:relative;height:var(--main-height);width:var(--main-width);overflow:hidden;display:flex;justify-content:center;align-items:center;border-radius:5px;background:#05070b}.image-container img{height:100%;width:100%;object-fit:cover}.iframe-tile{position:absolute;overflow:hidden;border:0;display:flex;height:var(--main-height);width:var(--main-width);border-radius:5px;background:#000}.image-title{position:absolute;bottom:6%;left:50%;transform:translate(-50%,-50%);color:#fff;background:#000;font-size:1vw;border-left:.25vw solid #000;border-right:.25vw solid #000;padding:1px 8px;z-index:2;white-space:nowrap}.click-overlay{position:absolute;inset:0;background:transparent;z-index:1;cursor:pointer}.media{height:100%;width:100%}.hidden{display:none}.menuL,.menuR{display:grid;gap:3px;position:absolute;margin-top:10vh;z-index:2;transition:.3s}.menuL{left:calc(-5.2vw)}.menuR{right:-5px;width:30px}.menuL:hover{left:0}.menuR:hover{right:0;width:7vw}#mySidenavL a,#mySidenavR a{position:relative;display:block;transition:.3s;padding:12px 15px 8px;text-decoration:none;font-family:"Bebas Neue",sans-serif;font-size:1.2vw;color:white;box-shadow:4px 4px 12px rgba(0,0,0,.5)}#mySidenavL a{left:calc(-.2vw - 10px);width:5vw;text-align:right;border-radius:0 5px 5px 0}#mySidenavL a:hover{left:0}#mySidenavR a{right:calc(-.2vw - 10px);width:7vw;text-align:left;border-radius:5px 0 0 5px}#mySidenavR a:hover{right:0}.rss-ticker{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,.55);overflow:hidden;white-space:nowrap;padding:3px 0;font-size:1.4vh;font-weight:bold;z-index:10}.rss-ticker-content{display:inline-block;padding-left:100%;animation:ticker 90s linear infinite}.rss-ticker-content a{text-decoration:none;color:var(--orange);margin-right:50px}@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);color:white;padding:50px;z-index:3}.overlay-content{background:#333;padding:20px;border-radius:10px;max-height:80vh;overflow-y:auto}.close-btn{cursor:pointer;color:white;float:right;font-size:20px}@media(max-width:900px){.child,.image-title{font-size:10px}}
</style>
<script src="wheelzoom.js"></script>
<script src="config.js"></script>
<script>
window.curSettingsSrc='config.js';window.largeShow=0;window.aIdx=[];window.aInt=[];
function isVideo(s){return ['.mp4','.webm','.ogg','.ogv'].some(e=>String(s).includes(e))}function getVideoType(s){return s.includes('.mp4')?'video/mp4':s.includes('.webm')?'video/webm':(s.includes('.ogg')||s.includes('.ogv'))?'video/ogg':''}function isFrame(s){return String(s).includes('iframe|')||String(s).includes('iframedark|')}function isDarkFrame(s){return String(s).includes('iframedark|')}function isDark(s){return String(s).includes('dark|')}function isInvert(s){return String(s).includes('invert|')}function getImgURL(u){return String(u).includes('?')?u:u+'?_='+Date.now()}function pad(n){return String(n).padStart(2,'0')}
function updateTopBar(){const n=new Date();topBarLeft.textContent=n.toLocaleDateString('fr-FR',{weekday:'long',month:'long',day:'numeric'})+' - '+n.toLocaleTimeString('fr-FR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',timeZoneName:'short'});topBarCenter.textContent=window.topBarCenterText||'F4IOW · COLMAR · JN38QB';topBarRight.textContent=n.toISOString().slice(0,10)+' '+n.toISOString().slice(11,19)+' UTC'}
function setRot(){if(typeof tileDelay==='undefined')aInt[0]=setInterval(()=>slide(),30000);else tileDelay.forEach((t,i)=>{if(t>0)aInt[i]=setInterval(()=>slide(i),t)})}function rotStop(){aInt.forEach(x=>clearTimeout(x))}
function MenuOpt(num){window.stop();rotStop();const m=String(aURL[num][1]||'').toLowerCase();if(m==='refresh'){location.reload();return}if(m==='help'){alert('Double-clic pour zoomer. Clic droit pour changer. 73 de F4IOW.');return}if(m==='back'){FullScreen.src='about:blank';iFrameContainer.style.zIndex=-2;FullScreen.style.display='none';setRot();return}iFrameContainer.style.zIndex=1;FullScreen.style.display='block';let src=aURL[num][2];FullScreen.style.filter=isDark(src)?'invert(1) hue-rotate(180deg)':'none';src=String(src).replace('dark|','');FullScreen.src=src;FullScreen.style.transform='scale('+aURL[num][3]+')'}
function larger(event){const t=event.target||event.srcElement;if(largeShow===1){setRot();largeShow=0;imgZoom.style.zIndex=-2}else{window.stop();rotStop();largeShow=1;const m=t.id.match(/\d+/);if(!m)return;largeIdx=+m[0];imgZoom.style.zIndex=3;const im=document.getElementById('Image'+largeIdx);if(im)ImageLarge.src=im.src}}
function rotate(event){event.preventDefault();let i=largeShow===1?largeIdx:+(event.target||event.srcElement).id.match(/\d+/)[0];imgRot(i)}
function imgRot(i){if(aIMG[i].length>2){++aIdx[i];if(aIdx[i]>aIMG[i].length-1)aIdx[i]=1}const cur=aIMG[i][aIdx[i]],vid=document.getElementById('Video'+i),img=document.getElementById('Image'+i),ifr=document.getElementById('iFrame'+i),ov=document.getElementById('ClickOverlay'+i);if(ov)ov.style.display=(isVideo(cur)||isFrame(cur))?'block':'none';if(isVideo(cur)){vid.src=getImgURL(cur);vid.classList.remove('hidden');img.classList.add('hidden');ifr.classList.add('hidden')}else if(isFrame(cur)){let p=(isDarkFrame(cur)?cur.split('iframedark|'):cur.split('iframe|'))[1].split('|');ifr.src=p[0];if(p[1])ifr.style.transform='scale('+p[1]+')';ifr.classList.remove('hidden');vid.classList.add('hidden');img.classList.add('hidden')}else{let src=cur;if(isInvert(src)){img.style.filter='invert(1)';src=src.replace('invert|','')}else img.style.filter='none';img.src=getImgURL(src);img.classList.remove('hidden');vid.classList.add('hidden');ifr.classList.add('hidden')}}
function slide(i){if(typeof i==='undefined')aIMG.forEach((_,i)=>imgRot(i));else imgRot(i)}
function start(){const cols=window.layout_cols||4,rows=window.layout_rows||3;document.documentElement.style.setProperty('--main-layout','auto '.repeat(cols));document.documentElement.style.setProperty('--main-width',99.6/cols+'vw');document.documentElement.style.setProperty('--main-height',93/rows+'vh');for(let i=0;i<cols*rows;i++){aIdx.push(1);aInt.push(null)}aURL.unshift(['add10d','BACK','',1,'L'],['0dd1a7','Help','',1,'L'],['add10d','BACK','',1,'R'],['ff9100','Refresh','?_=x',1,'R']);aURL.forEach((it,index)=>{const d=document.createElement('div');d.innerHTML=`<a href="#" style="background-color:#${String(it[0]).replace('#','')}" onclick="MenuOpt(${index})">${it[1]}</a>`;if(it[4]==='R'){d.id='mySidenavR';myMenuR.appendChild(d)}else{d.id='mySidenavL';myMenuL.appendChild(d)}});aIMG.forEach((it,index)=>{const box=document.createElement('div');box.className='image-container';box.id='box'+index;const v=document.createElement('video');v.id='Video'+index;v.classList.add('media','hidden');v.controls=true;v.muted=true;v.autoplay=true;v.loop=true;const im=document.createElement('img');im.id='Image'+index;im.classList.add('hidden');im.oncontextmenu=rotate;im.ondblclick=larger;const fr=document.createElement('iframe');fr.className='iframe-tile';fr.id='iFrame'+index;fr.classList.add('hidden');const ov=document.createElement('div');ov.className='click-overlay';ov.id='ClickOverlay'+index;ov.oncontextmenu=rotate;ov.ondblclick=function(e){const cur=aIMG[index][aIdx[index]];if(isVideo(cur)||isFrame(cur))this.style.display='none';else larger(e)};box.append(v,im,fr,ov);dash.appendChild(box);const title=document.createElement('div');title.className='image-title';title.id='Title'+index;title.innerHTML=Array.isArray(it[0])?it[0][0]:it[0];box.appendChild(title);imgRot(index)});if(typeof wheelzoom==='function')wheelzoom(document.querySelectorAll('img'));const rss=document.createElement('div');rss.className='rss-ticker';rss.innerHTML='<div class="rss-ticker-content"><a href="https://qrz.com/db/F4IOW" target="_blank">F4IOW QRZ</a><a href="https://www.amsat.org/" target="_blank">AMSAT</a><a href="https://www.solarham.net/" target="_blank">SolarHam</a><a href="https://mwayembe-eng.github.io/f4iow-widget/" target="_blank">F4IOW Widget</a></div>';document.body.appendChild(rss);setRot()}
window.addEventListener('load',()=>{updateTopBar();setInterval(updateTopBar,1000);start()});
</script>
</head><body><div id="iFrameContainer" class="iframe-container"><iframe id="FullScreen" class="full-screen" src="" title="Zoom"></iframe></div><div id="imgZoom" class="img-zoom"><img class="image-large" id="ImageLarge" alt="pic" ondblclick="larger(event);" oncontextmenu="rotate(event);"></div><div id="myMenuL" class="menuL"></div><div id="myMenuR" class="menuR"></div><div id="defaultFrame" class="default-frame"><div class="top-bar"><div id="topBarLeft" class="child" style="text-align:left;padding-left:7px;color:blanchedalmond">&nbsp;</div><div id="topBarCenter" class="child" style="text-align:center;color:rgb(0,119,255)">&nbsp;</div><div id="topBarRight" class="child" style="text-align:right;padding-right:5px;color:aquamarine">&nbsp;</div></div><div id="dash" class="dashboard"></div></div></body></html>
