<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MonDash Radio | F4IOW</title>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto+Condensed:wght@300;700&family=Victor+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root {
--bg-color: #0a0a0a;
--panel-bg: rgba(30, 30, 35, 0.9);
--accent-blue: #0077ff;
--accent-green: #00ffcc;
--accent-orange: #ff9100;
--text-color: #e0e0e0;
--border-radius: 8px;
--grid-gap: 8px;
/* Variables dynamiques gérées par JS */
--main-layout: repeat(4, 1fr);
--main-height: 30vh;
}

* { box-sizing: border-box; }

body, html {
background: var(--bg-color);
color: var(--text-color);
margin: 0;
height: 100vh;
font-family: 'Roboto Condensed', sans-serif;
overflow: hidden;
}

/* Barre supérieure stylisée */
.top-bar {
display: grid;
grid-template-columns: 1fr 1.5fr 1fr;
background: rgba(20, 20, 20, 0.95);
backdrop-filter: blur(10px);
border-bottom: 1px solid #333;
padding: 8px 15px;
height: 50px;
align-items: center;
}

.top-bar .child {
font-family: 'Victor Mono', monospace;
font-size: 13px;
letter-spacing: 0.5px;
}

#topBarCenter {
font-family: 'Audiowide', cursive;
font-size: 1.2rem;
text-transform: uppercase;
}

/* Grille du Dashboard */
.dashboard {
display: grid;
grid-template-columns: var(--main-layout);
gap: var(--grid-gap);
padding: var(--grid-gap);
height: calc(100vh - 80px); /* Ajusté pour barre sup + ticker */
overflow-y: auto;
}

.image-container {
position: relative;
background: #111;
border-radius: var(--border-radius);
overflow: hidden;
border: 1px solid #222;
transition: transform 0.2s, border-color 0.2s;
height: var(--main-height);
}

.image-container:hover {
border-color: var(--accent-blue);
z-index: 10;
}

.image-container img, .image-container video, .iframe-tile {
width: 100%;
height: 100%;
object-fit: cover;
}

.image-title {
position: absolute;
top: 10px;
left: 10px;
background: rgba(0, 0, 0, 0.7);
padding: 2px 8px;
border-radius: 4px;
font-size: 11px;
color: var(--accent-green);
pointer-events: none;
z-index: 5;
text-transform: uppercase;
}

/* Menus latéraux épurés */
.menuL, .menuR {
position: fixed;
top: 60px;
display: flex;
flex-direction: column;
gap: 5px;
z-index: 100;
}

.menuL { left: 0; }
.menuR { right: 0; }

.menu-link {
text-decoration: none;
color: white;
padding: 10px 15px;
font-size: 12px;
font-weight: bold;
transition: 0.3s;
min-width: 80px;
text-align: center;
}

.menuL .menu-link { border-radius: 0 5px 5px 0; transform: translateX(-60px); }
.menuR .menu-link { border-radius: 5px 0 0 5px; transform: translateX(60px); }

.menuL:hover .menu-link, .menuR:hover .menu-link { transform: translateX(0); }

/* Ticker RSS discret */
.rss-ticker {
position: fixed;
bottom: 0;
width: 100%;
background: #000;
border-top: 1px solid #333;
height: 30px;
display: flex;
align-items: center;
font-family: 'Victor Mono', monospace;
}

.rss-ticker-content a {
color: var(--accent-orange);
font-weight: bold;
margin-right: 40px;
}

/* Styles formulaire de config (Simplifié) */
.settings-Page {
background: #1a1a1c;
color: white;
padding: 30px;
border-radius: 15px;
}

button {
background: #333;
color: white;
border: 1px solid #555;
padding: 5px 15px;
cursor: pointer;
border-radius: 4px;
}
button:hover { background: var(--accent-blue); }

/* Utilitaires */
.hidden { display: none; }
</style>
</head>
<body onload="main()">

<!-- Conteneur pour le mode Plein Écran -->
<div id="iFrameContainer" class="iframe-container" style="position:fixed; width:100%; height:100%; z-index:-1; background:black;">
<iframe id="FullScreen" style="width:100%; height:100%; border:none; display:none;"></iframe>

<!-- Page de Configuration intégrée -->
<div id="settingsPage" class="settings-Page hidden" style="position:relative; z-index:1000; overflow-y:auto; height:100%;">
<div id="fixedSection">
<button onclick="location.reload()">Fermer / Appliquer</button>
<button id="saveConfig">💾 Sauvegarder</button>
</div>
<h2>⚙️ Configuration MonDash</h2>
<div class="section">
<label>Texte Central:</label> <input type="text" id="CenterText" style="width:300px">
</div>
<div class="section">
<label>Grille:</label>
Cols: <input type="number" id="layout_cols" style="width:50px">
Rows: <input type="number" id="layout_rows" style="width:50px">
</div>
<!-- Les tables de config s'injectent ici via votre JS existant -->
<div id="configForm">
<table id="menuTable"><thead><tr><th>Couleur</th><th>Texte</th><th>URL</th><th>Actions</th></tr></thead><tbody></tbody></table>
<table id="dashboardTable"><thead><tr><th>Titre</th><th>URLs</th><th>Intervalle</th><th>Actions</th></tr></thead><tbody></tbody></table>
</div>
</div>
</div>

<!-- Interface Principale -->
<div id="defaultFrame">
<header class="top-bar">
<div id="topBarLeft" class="child" style="color: var(--accent-green)">--:--:--</div>
<div id="topBarCenter" class="child" style="color: var(--accent-blue); text-align: center;">MONDASH RADIO</div>
<div id="topBarRight" class="child" style="color: var(--accent-orange); text-align: right;">UTC --:--</div>
</header>

<main id="dash" class="dashboard">
<!-- Injecté par JS -->
</main>
</div>

<!-- Menus -->
<nav id="myMenuL" class="menuL"></nav>
<nav id="myMenuR" class="menuR"></nav>

<!-- Overlay Infos -->
<div id="overlay" class="overlay hidden">
<div class="close-btn" onclick="hideOverlay()">✖</div>
<div class="overlay-content" id="array-info"></div>
</div>

<!-- Votre logique JS originale (conservée et adaptée pour les nouveaux IDs) -->
<script>
// Note: Insérez ici votre bloc de script original.
// J'ai mis à jour les sélecteurs CSS ci-dessus pour correspondre à vos fonctions.
// Assurez-vous que la fonction start() met à jour les variables CSS :

function start() {
const cols = window.layout_cols || 4;
const rows = window.layout_rows || 3;
document.documentElement.style.setProperty('--main-layout', `repeat(${cols}, 1fr)`);
document.documentElement.style.setProperty('--main-height', `${90 / rows}vh`);

// ... suite de votre fonction start() originale pour générer les div "image-container" ...
}
</script>
</body>
</html>
